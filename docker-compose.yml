services:
  cms-facility:
    build: .
    command: python -m servers.cms_facility.server
    ports:
      - "8006:8006"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8006
    volumes:
      - healthcare-cache:/root/.healthcare-data-mcp/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8006),5); s.close()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

