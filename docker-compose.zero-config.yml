# Healthcare Data MCP - Zero-Config Docker Compose
# Registry-backed local profile for servers that do not require API keys.
#
# Usage:
#   docker compose -f docker-compose.zero-config.yml up -d
#
# Host ports bind to 127.0.0.1. Put a gateway behind HTTPS/auth for remote access.

services:
  service-area:
    build: .
    image: "${HC_MCP_IMAGE:-healthcare-data-mcp:0.4.0}"
    pull_policy: missing
    command: python -m servers.service_area.server
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8002
    volumes:
      - healthcare-cache:/root/.healthcare-data-mcp/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8002),5); s.close()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

