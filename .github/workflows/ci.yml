name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff
        run: ruff check .

  tests:
    runs-on: ubuntu-latest
    env:
      SEC_USER_AGENT: "CI ci@example.com"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libgdal-dev libproj-dev
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/servers/health_system_profiler -q
      - name: Server smoke tests
        run: pytest tests/servers/test_smoke_servers.py -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t healthcare-data-mcp .
