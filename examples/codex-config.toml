# Example ~/.codex/config.toml entries for healthcare-data-mcp.
# Keep only the servers you actually want Codex to start.
# Run `hc-mcp-setup --interactive` first to create .env, then either start
# Codex from the repo root or set HC_MCP_ENV_FILE below.

[mcp_servers.serviceArea]
command = "hc-mcp"
args = ["service-area"]

[mcp_servers.geoDemographics]
command = "hc-mcp"
args = ["geo-demographics"]

[mcp_servers.driveTime]
command = "hc-mcp"
args = ["drive-time"]

[mcp_servers.hospitalQuality]
command = "hc-mcp"
args = ["hospital-quality"]

[mcp_servers.cmsFacility]
command = "hc-mcp"
args = ["cms-facility"]

[mcp_servers.healthSystemProfiler]
command = "hc-mcp"
args = ["health-system-profiler"]

[mcp_servers.financialIntelligence]
command = "hc-mcp"
args = ["financial-intelligence"]

[mcp_servers.priceTransparency]
command = "hc-mcp"
args = ["price-transparency"]

[mcp_servers.physicianReferralNetwork]
command = "hc-mcp"
args = ["physician-referral-network"]

[mcp_servers.workforceAnalytics]
command = "hc-mcp"
args = ["workforce-analytics"]

[mcp_servers.claimsAnalytics]
command = "hc-mcp"
args = ["claims-analytics"]

[mcp_servers.publicRecords]
command = "hc-mcp"
args = ["public-records"]
# Optional when Codex is not launched from the repo root:
# env = { HC_MCP_ENV_FILE = "/absolute/path/to/healthcare-data-mcp/.env" }

[mcp_servers.webIntelligence]
command = "hc-mcp"
args = ["web-intelligence"]

[mcp_servers.discovery]
command = "hc-mcp"
args = ["discovery"]

[mcp_servers.gateway]
command = "hc-mcp"
args = ["gateway"]

[mcp_servers.providerEnrollment]
command = "hc-mcp"
args = ["provider-enrollment"]

[mcp_servers.communityHealth]
command = "hc-mcp"
args = ["community-health"]

[mcp_servers.researchTrials]
command = "hc-mcp"
args = ["research-trials"]

[mcp_servers.liveGateway]
command = "hc-mcp"
args = ["live-gateway"]

[mcp_servers.cacheManager]
command = "hc-mcp"
args = ["cache-manager"]

# If the Docker Compose Streamable HTTP servers are already running, Codex can
# connect to localhost instead of spawning stdio processes.
[mcp_servers.serviceAreaHttp]
url = "http://127.0.0.1:8002/mcp"

[mcp_servers.geoDemographicsHttp]
url = "http://127.0.0.1:8003/mcp"

[mcp_servers.driveTimeHttp]
url = "http://127.0.0.1:8004/mcp"

